<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISONER'S DILEMMA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ffff00;
    font-family: 'Press Start 2P', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }
  #game-container {
    position: relative;
    width: 640px;
    height: 100vh;
    max-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    padding: 6px 12px;
    font-size: 8px;
    background: #0a0a1a;
    border-bottom: 2px solid #2121de;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }
  .hud-item { display: flex; flex-direction: column; gap: 2px; }
  .hud-label { color: #666; font-size: 6px; }
  .hud-value { color: #ffff00; }

  #canvas-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    z-index: 1;
  }
  canvas { display: block; image-rendering: pixelated; }

  #dialogue-box {
    flex-shrink: 0;
    background: #0a0a1a;
    border-top: 2px solid #2121de;
    padding: 8px 12px;
    font-size: 8px;
    line-height: 1.7;
    height: 110px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 10;
    position: relative;
  }
  #dialogue-text { color: #ccc; flex: 1; overflow: hidden; }
  #choice-area { display: flex; gap: 16px; justify-content: center; }
  .choice-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 6px 18px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
  }
  .choice-btn:hover { transform: scale(1.05); }
  #btn-defect { color: #ff0000; border-color: #ff0000; }
  #btn-defect:hover { background: rgba(255,0,0,0.15); }
  #btn-cooperate { color: #00ff00; border-color: #00ff00; }
  #btn-cooperate:hover { background: rgba(0,255,0,0.15); }

  #timer-bar {
    width: 100%; height: 4px; background: #222;
    border-radius: 2px; overflow: hidden; display: none;
  }
  #timer-fill {
    height: 100%; background: #ffff00; width: 100%;
    transition: width linear;
  }

  #title-screen {
    position: absolute; inset: 0; background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; gap: 20px;
  }
  #title-screen h1 {
    font-size: 16px; color: #ffff00;
    text-shadow: 2px 2px #ff0000;
    text-align: center; line-height: 1.6;
  }
  #title-screen .subtitle {
    font-size: 7px; color: #2121de;
    text-align: center; line-height: 2.2;
  }
  .blink { animation: blink 1s step-end infinite; font-size: 8px; color: #ffff00; }
  @keyframes blink { 50% { opacity: 0; } }

  #game-over {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; gap: 14px;
  }
  #game-over h2 { font-size: 14px; color: #ff0000; }
  #game-over .score { font-size: 9px; color: #ffff00; }
  #game-over .restart { font-size: 8px; color: #00ffde; cursor: pointer; }
</style>
</head>
<body>
<div id="game-container">
  <div id="title-screen">
    <h1>PRISONER'S<br>DILEMMA</h1>
    <div class="subtitle">
      YOU HAVE BEEN DETAINED.<br>
      SO HAVE YOUR ACCOMPLICES.<br><br>
      COOPERATE WITH THEM... OR BETRAY.<br>
      BUT BE QUICK — OR THE CHOICE<br>
      IS MADE FOR YOU.
    </div>
    <div class="blink">PRESS ANY KEY TO BEGIN</div>
  </div>

  <div id="game-over">
    <h2>GAME OVER</h2>
    <div class="score" id="final-score"></div>
    <div class="score" id="final-status"></div>
    <div class="restart blink" onclick="restartGame()">PRESS ANY KEY TO RETRY</div>
  </div>

  <div id="hud">
    <div class="hud-item"><span class="hud-label">SENTENCE</span><span class="hud-value" id="hud-sentence" style="color:#ff4444">0 YRS</span></div>
    <div class="hud-item"><span class="hud-label">ROUND</span><span class="hud-value" id="hud-round" style="color:#00ffde">1/10</span></div>
    <div class="hud-item"><span class="hud-label">REPUTATION</span><span class="hud-value" id="hud-rep" style="color:#00ff00">UNKNOWN</span></div>
    <div class="hud-item"><span class="hud-label">SUSPECT</span><span class="hud-value" id="hud-opponent">???</span></div>
  </div>

  <div id="canvas-wrap"><canvas id="game-canvas"></canvas></div>

  <div id="dialogue-box">
    <div id="timer-bar"><div id="timer-fill"></div></div>
    <div id="dialogue-text"></div>
    <div id="choice-area"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

const T = 18; // tile size
const TOTAL_ROUNDS = 10;
let state = 'title';
let round = 0, sentence = 0, reputation = 0;
let currentOpponent = null, playerChoice = null, opponentChoice = null;
let animFrame = 0;

const player = { x: 0, y: 0, dir: 2 }; // dir: 0=right,1=down,2=left,3=up

// Map: 0=void, 1=wall, 2=floor, 3=hall, 4=door, 5=table, 6=chair, 7=light(ceiling)
const MW = 33, MH = 21;
const map = [];

const COLORS = ['#ff4444','#ff88cc','#44ddff','#ffaa33'];
const NAMES = ['VOSS','SILVA','RENKO','BRIGGS'];
const STRATEGIES = ['tit-for-tat','random','grudger','always-defect'];

const suspects = NAMES.map((name, i) => ({
  name, color: COLORS[i], strategy: STRATEGIES[i],
  x: 0, y: 0, betrayed: false, lastPlayerMove: null,
  roomCenter: null, doorX: 0, doorY: 0
}));

let roundOrder = [];

// --- MAP BUILDER ---
function buildMap() {
  for (let y = 0; y < MH; y++) { map[y] = []; for (let x = 0; x < MW; x++) map[y][x] = 0; }

  // Central corridor (horizontal) — row 9-11
  for (let x = 1; x < MW - 1; x++) { map[9][x] = 3; map[10][x] = 3; map[11][x] = 3; }

  // Vertical corridor
  for (let y = 1; y < MH - 1; y++) { map[y][16] = 3; }

  // Four interrogation rooms (7 wide x 6 tall)
  const RW = 7, RH = 6;
  const rooms = [
    { rx: 3,  ry: 2,  doorX: 6,  doorY: 9  },
    { rx: 22, ry: 2,  doorX: 25, doorY: 9  },
    { rx: 3,  ry: 14, doorX: 6,  doorY: 11 },
    { rx: 22, ry: 14, doorX: 25, doorY: 11 },
  ];

  rooms.forEach((rm, i) => {
    // Room interior
    for (let dy = 0; dy < RH; dy++) {
      for (let dx = 0; dx < RW; dx++) {
        map[rm.ry + dy][rm.rx + dx] = 2;
      }
    }
    // Walls around room
    for (let dx = -1; dx <= RW; dx++) {
      if (rm.rx + dx >= 0 && rm.rx + dx < MW) {
        if (rm.ry - 1 >= 0) map[rm.ry - 1][rm.rx + dx] = 1;
        if (rm.ry + RH < MH) map[rm.ry + RH][rm.rx + dx] = 1;
      }
    }
    for (let dy = -1; dy <= RH; dy++) {
      if (rm.ry + dy >= 0 && rm.ry + dy < MH) {
        if (rm.rx - 1 >= 0) map[rm.ry + dy][rm.rx - 1] = 1;
        if (rm.rx + RW < MW) map[rm.ry + dy][rm.rx + RW] = 1;
      }
    }

    // Table (center of room)
    map[rm.ry + 2][rm.rx + 2] = 5;
    map[rm.ry + 2][rm.rx + 3] = 5;
    map[rm.ry + 2][rm.rx + 4] = 5;
    // Chairs
    map[rm.ry + 1][rm.rx + 3] = 6;
    map[rm.ry + 3][rm.rx + 3] = 6;
    // Overhead light
    map[rm.ry + 0][rm.rx + 3] = 7;

    // Corridor connecting room to main hall
    map[rm.doorY][rm.doorX] = 4;
    if (rm.ry < 9) {
      for (let y = rm.ry + RH; y < rm.doorY; y++) { map[y][rm.doorX] = 3; }
    } else {
      for (let y = rm.doorY + 1; y < rm.ry; y++) { map[y][rm.doorX] = 3; }
    }

    // Suspect position (sitting across table from player chair)
    suspects[i].x = rm.rx + 3;
    suspects[i].y = rm.ry + 1;
    suspects[i].roomCenter = { x: rm.rx + 3, y: rm.ry + 3 };
    suspects[i].doorX = rm.doorX;
    suspects[i].doorY = rm.doorY;
  });

  player.x = 1; player.y = 10; player.dir = 0;
}

function isWalkable(x, y) {
  if (x < 0 || x >= MW || y < 0 || y >= MH) return false;
  const t = map[y][x];
  return t === 2 || t === 3 || t === 4 || t === 6;
}

// --- DRAWING ---
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawMap() {
  for (let y = 0; y < MH; y++) {
    for (let x = 0; x < MW; x++) {
      const px = x * T, py = y * T;
      const t = map[y][x];

      if (t === 0) continue; // void — black
      if (t === 1) {
        // Wall — blue outline style
        ctx.fillStyle = '#1a1a4e';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#2828de';
        ctx.fillRect(px + 1, py + 1, T - 2, T - 2);
        ctx.fillStyle = '#1a1a4e';
        ctx.fillRect(px + 2, py + 2, T - 4, T - 4);
      } else if (t === 2) {
        // Room floor — dark concrete
        ctx.fillStyle = '#151518';
        ctx.fillRect(px, py, T, T);
        // Subtle grid lines
        ctx.fillStyle = '#1c1c20';
        ctx.fillRect(px, py, 1, T);
        ctx.fillRect(px, py, T, 1);
      } else if (t === 3) {
        // Hallway floor
        ctx.fillStyle = '#111115';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#1a1a1e';
        ctx.fillRect(px, py, 1, T);
        ctx.fillRect(px, py, T, 1);
      } else if (t === 4) {
        // Door
        ctx.fillStyle = '#111115';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#665522';
        ctx.fillRect(px + 2, py + 1, T - 4, T - 2);
      } else if (t === 5) {
        // Table
        ctx.fillStyle = '#151518';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#555566';
        ctx.fillRect(px + 1, py + 2, T - 2, T - 4);
        ctx.fillStyle = '#44444f';
        ctx.fillRect(px + 2, py + 3, T - 4, T - 6);
      } else if (t === 6) {
        // Chair
        ctx.fillStyle = '#151518';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#333340';
        ctx.fillRect(px + 3, py + 3, T - 6, T - 6);
      } else if (t === 7) {
        // Overhead light — yellow glow
        ctx.fillStyle = '#151518';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = 'rgba(255,255,100,0.12)';
        ctx.fillRect(px - T, py - T, T * 3, T * 3);
        ctx.fillStyle = '#ffff66';
        ctx.fillRect(px + 4, py + 4, T - 8, T - 8);
      }
    }
  }
}

function drawPerson(x, y, headColor, bodyColor, dir, anim) {
  const px = x * T, py = y * T;
  const hw = Math.floor(T * 0.45); // half-width of body
  const cx = px + Math.floor(T / 2);
  // Body (torso)
  ctx.fillStyle = bodyColor;
  ctx.fillRect(cx - hw, py + 7, hw * 2, T - 9);
  // Head
  ctx.fillStyle = headColor;
  ctx.fillRect(cx - hw + 1, py + 1, hw * 2 - 2, 7);
  // Eyes (direction-based)
  ctx.fillStyle = '#000';
  const eSize = 2;
  if (dir === 0) { // right
    ctx.fillRect(cx + 2, py + 3, eSize, eSize);
    ctx.fillRect(cx + 2, py + 5, eSize, eSize);
  } else if (dir === 2) { // left
    ctx.fillRect(cx - 4, py + 3, eSize, eSize);
    ctx.fillRect(cx - 4, py + 5, eSize, eSize);
  } else if (dir === 1) { // down
    ctx.fillRect(cx - 3, py + 5, eSize, eSize);
    ctx.fillRect(cx + 1, py + 5, eSize, eSize);
  } else { // up
    ctx.fillRect(cx - 3, py + 2, eSize, eSize);
    ctx.fillRect(cx + 1, py + 2, eSize, eSize);
  }
  // Legs — simple animation
  const legOff = (anim % 16 < 8) ? 1 : 0;
  ctx.fillStyle = bodyColor === '#335533' ? '#224422' : '#333';
  ctx.fillRect(cx - hw + 1 - legOff, py + T - 4, 4, 4);
  ctx.fillRect(cx + hw - 5 + legOff, py + T - 4, 4, 4);
}

function drawPlayer() {
  drawPerson(player.x, player.y, '#eebb77', '#335533', player.dir, animFrame);
  // Optionally draw a small "!" or highlight when in room
}

function drawSuspects() {
  suspects.forEach(s => {
    drawPerson(s.x, s.y, s.color, '#333344', 1, 0);
    // Name tag above (only when nearby or in interrogation)
    if (state === 'interrogation' && currentOpponent === s) {
      ctx.fillStyle = s.color;
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(s.name, s.x * T + T / 2, s.y * T - 2);
    }
  });
}

function render() {
  const W = MW * T;
  const H = MH * T;
  if (canvas.width !== W) canvas.width = W;
  if (canvas.height !== H) canvas.height = H;

  // Scale canvas element to fit within its wrapper
  const wrap = document.getElementById('canvas-wrap');
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;
  if (wrapW > 0 && wrapH > 0) {
    const scale = Math.min(wrapW / W, wrapH / H);
    canvas.style.width = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  if (map.length > 0 && map[0].length > 0) {
    drawMap();
    drawSuspects();
    drawPlayer();
  }
}

// --- PATHFINDING (BFS) ---
function findPath(sx, sy, ex, ey) {
  const visited = new Set();
  const queue = [[sx, sy, []]];
  visited.add(`${sx},${sy}`);
  while (queue.length) {
    const [cx, cy, path] = queue.shift();
    if (cx === ex && cy === ey) return path;
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = cx + dx, ny = cy + dy, key = `${nx},${ny}`;
      if (!visited.has(key) && isWalkable(nx, ny)) {
        visited.add(key);
        queue.push([nx, ny, [...path, [nx, ny]]]);
      }
    }
  }
  return null;
}

function walkPlayerTo(tx, ty) {
  return new Promise(resolve => {
    const path = findPath(player.x, player.y, tx, ty);
    if (!path || !path.length) { resolve(); return; }
    let step = 0;
    const iv = setInterval(() => {
      if (step >= path.length) { clearInterval(iv); resolve(); return; }
      const [nx, ny] = path[step];
      if (nx > player.x) player.dir = 0;
      else if (nx < player.x) player.dir = 2;
      else if (ny > player.y) player.dir = 1;
      else if (ny < player.y) player.dir = 3;
      player.x = nx; player.y = ny;
      step++;
    }, 60);
  });
}

// --- GAME LOGIC ---
function getOpponentChoice(s) {
  switch (s.strategy) {
    case 'tit-for-tat': return s.lastPlayerMove ?? 'cooperate';
    case 'random': return Math.random() < 0.5 ? 'cooperate' : 'defect';
    case 'grudger': return s.betrayed ? 'defect' : 'cooperate';
    case 'always-defect': return 'defect';
  }
}

function resolveRound(p, o) {
  if (p === 'cooperate' && o === 'cooperate') return { pY: 1, oY: 1 };
  if (p === 'defect' && o === 'defect') return { pY: 3, oY: 3 };
  if (p === 'defect' && o === 'cooperate') return { pY: 0, oY: 5 };
  return { pY: 5, oY: 0 };
}

function typeText(el, text, speed = 25) {
  return new Promise(resolve => {
    el.textContent = '';
    let i = 0;
    const iv = setInterval(() => {
      el.textContent += text[i]; i++;
      if (i >= text.length) { clearInterval(iv); resolve(); }
    }, speed);
  });
}

async function startRound() {
  round++;
  currentOpponent = suspects[roundOrder[round - 1]];
  document.getElementById('hud-round').textContent = `${round}/${TOTAL_ROUNDS}`;
  document.getElementById('hud-opponent').textContent = currentOpponent.name;
  document.getElementById('hud-opponent').style.color = currentOpponent.color;

  state = 'walking';
  await walkPlayerTo(currentOpponent.doorX, currentOpponent.doorY);
  await walkPlayerTo(currentOpponent.roomCenter.x, currentOpponent.roomCenter.y);

  state = 'interrogation';
  await runInterrogation();
}

async function runInterrogation() {
  const dText = document.getElementById('dialogue-text');
  const cArea = document.getElementById('choice-area');
  const tBar = document.getElementById('timer-bar');
  const tFill = document.getElementById('timer-fill');
  cArea.innerHTML = '';

  const intros = [
    `${currentOpponent.name} sits across the table. Eyes darting.`,
    `The fluorescent light hums. ${currentOpponent.name} stares at the wall.`,
    `A guard shoves you into the chair. ${currentOpponent.name} won't look at you.`,
    `${currentOpponent.name} drums fingers on cold metal. Waiting.`,
  ];
  await typeText(dText, intros[Math.floor(Math.random() * intros.length)]);
  await new Promise(r => setTimeout(r, 600));

  await typeText(dText,
    `WARDEN: "One talks, the other does time. Both talk, both suffer. Stay silent... we still got something on you."  —  DEFECT [D] or COOPERATE [C]?`
  );

  // Hidden random timer: 2–6s
  const dur = 2000 + Math.random() * 4000;
  tBar.style.display = 'block';
  tFill.style.transition = 'none';
  tFill.style.width = '100%';
  tFill.offsetHeight; // reflow
  tFill.style.transition = `width ${dur}ms linear`;
  tFill.style.width = '0%';

  playerChoice = null;
  cArea.innerHTML = `
    <button class="choice-btn" id="btn-defect" onclick="makeChoice('defect')">[D] DEFECT</button>
    <button class="choice-btn" id="btn-cooperate" onclick="makeChoice('cooperate')">[C] COOPERATE</button>
  `;

  return new Promise(resolve => {
    window._resolve = resolve;
    window._timer = setTimeout(() => {
      if (!playerChoice) makeChoice('cooperate', true);
    }, dur);
  });
}

async function makeChoice(choice, timeout = false) {
  if (playerChoice) return;
  playerChoice = choice;
  clearTimeout(window._timer);
  document.getElementById('timer-bar').style.display = 'none';
  document.getElementById('choice-area').innerHTML = '';

  currentOpponent.lastPlayerMove = choice;
  if (choice === 'defect') currentOpponent.betrayed = true;

  opponentChoice = getOpponentChoice(currentOpponent);
  const res = resolveRound(playerChoice, opponentChoice);
  sentence += res.pY;
  reputation += (choice === 'cooperate') ? 1 : -1;

  const dText = document.getElementById('dialogue-text');
  const you = choice === 'defect' ? 'BETRAYED' : 'STAYED SILENT';
  const they = opponentChoice === 'defect' ? 'BETRAYED' : 'STAYED SILENT';
  const tMsg = timeout ? ' (ran out of time — defaulted to silence)' : '';
  let txt = `YOU ${you}${tMsg}. ${currentOpponent.name} ${they}. `;
  if (res.pY === 0) txt += `Walk free. ${currentOpponent.name} takes the hit.`;
  else if (res.pY === 1) txt += 'Mutual silence. +1 YR each.';
  else if (res.pY === 3) txt += 'Both snitched. +3 YRS each.';
  else txt += `Sold out. +5 YRS.`;

  await typeText(dText, txt);
  document.getElementById('hud-sentence').textContent = `${sentence} YRS`;
  updateRep();

  await new Promise(r => setTimeout(r, 1800));

  state = 'walking';
  await walkPlayerTo(currentOpponent.doorX, currentOpponent.doorY);
  await walkPlayerTo(16, 10);

  if (round >= TOTAL_ROUNDS) endGame();
  else await startRound();
  if (window._resolve) window._resolve();
}

function updateRep() {
  const el = document.getElementById('hud-rep');
  if (reputation > 3)      { el.textContent = 'SAINT';   el.style.color = '#00ff00'; }
  else if (reputation > 1) { el.textContent = 'LOYAL';   el.style.color = '#00ff00'; }
  else if (reputation > -1){ el.textContent = 'UNKNOWN'; el.style.color = '#ffff00'; }
  else if (reputation > -3){ el.textContent = 'SUSPECT'; el.style.color = '#ff8800'; }
  else                     { el.textContent = 'RAT';     el.style.color = '#ff0000'; }
}

function endGame() {
  state = 'gameover';
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('final-score').textContent = `TOTAL SENTENCE: ${sentence} YEARS`;
  let s;
  if (sentence <= 10)      s = 'MASTER STRATEGIST';
  else if (sentence <= 20) s = 'SURVIVOR';
  else if (sentence <= 30) s = 'HARD TIME';
  else                     s = 'LIFE SENTENCE';
  document.getElementById('final-status').textContent = s;
}

function restartGame() {
  document.getElementById('game-over').style.display = 'none';
  initGame();
}

function initGame() {
  round = 0; sentence = 0; reputation = 0; playerChoice = null;
  state = 'playing';
  suspects.forEach(s => { s.betrayed = false; s.lastPlayerMove = null; });
  roundOrder = [];
  for (let i = 0; i < TOTAL_ROUNDS; i++) roundOrder.push(i % 4);
  for (let i = roundOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [roundOrder[i], roundOrder[j]] = [roundOrder[j], roundOrder[i]];
  }
  buildMap();
  updateRep();
  document.getElementById('hud-sentence').textContent = '0 YRS';
  document.getElementById('hud-round').textContent = `1/${TOTAL_ROUNDS}`;
  document.getElementById('hud-opponent').textContent = '???';
  document.getElementById('hud-opponent').style.color = '#ffff00';
  document.getElementById('dialogue-text').textContent = 'You are escorted down the corridor...';
  document.getElementById('choice-area').innerHTML = '';
  document.getElementById('timer-bar').style.display = 'none';
  setTimeout(() => startRound(), 800);
}

// --- INPUT ---
document.addEventListener('keydown', e => {
  if (state === 'title') {
    document.getElementById('title-screen').style.display = 'none';
    initGame(); return;
  }
  if (state === 'gameover') { restartGame(); return; }
  if (state === 'interrogation' && !playerChoice) {
    if (e.key === 'd' || e.key === 'D') makeChoice('defect');
    if (e.key === 'c' || e.key === 'C') makeChoice('cooperate');
  }
});

// --- LOOP ---
function gameLoop() {
  animFrame++;
  render();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
